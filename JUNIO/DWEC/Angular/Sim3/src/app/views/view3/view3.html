<section>
    <h1>Star Wars</h1>
</section>

<section>
    <div class="elementor-grid-3">    
        <div class="container elementor-grid">     
            @for (f of films; track f) {
            <div class="photo-container">
                <div class="photo" [style.background-image]="'url(' + f.photo + ')'"
                    (click)="selectFilm(f.id)">
                </div>
            </div>
            }
        </div>
    </div>
</section>

@if (modal === true) {
    <app-modal
        [title]="title"
        [characters]="names"
        (deseleccion)="volver()"
    >
    </app-modal>
}
