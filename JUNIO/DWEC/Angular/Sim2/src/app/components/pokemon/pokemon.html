<div class="card">
    <div class="photo"
        [ngStyle]="{ 'background-image': 'url(' + image + ')' }">
    </div>
    <div class="footer">
        <div class="titles">
            <h2 class='card-title'
                (click)="selection()"
            >{{ name }}</h2>
        </div>
    </div>
</div>
